name: Telegram daily jokes

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Joke time slot
        required: true
        default: morning
        type: choice
        options:
          - morning
          - afternoon
          - evening
  schedule:
    - cron: "0 8 * * *"
      timezone: "America/New_York"
    - cron: "30 12 * * *"
      timezone: "America/New_York"
    - cron: "0 20 * * *"
      timezone: "America/New_York"

permissions:
  contents: read

concurrency:
  group: telegram-daily-jokes
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore recent-joke history
        uses: actions/cache/restore@v4
        with:
          path: |
            data/selection_state-zh.json
            data/selection_state-en.json
          key: joke-history-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            joke-history-

      - name: Choose time slot
        shell: bash
        env:
          MANUAL_PHASE: ${{ inputs.phase }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule }}
        run: |
          if [[ -n "$MANUAL_PHASE" ]]; then
            phase="$MANUAL_PHASE"
          else
            case "$SCHEDULE_EXPRESSION" in
              "0 8 * * *") phase="morning" ;;
              "30 12 * * *") phase="afternoon" ;;
              "0 20 * * *") phase="evening" ;;
              *) echo "Unknown schedule: $SCHEDULE_EXPRESSION" >&2; exit 1 ;;
            esac
          fi
          echo "JOKE_PHASE=$phase" >> "$GITHUB_ENV"
          case "$phase" in
            morning|evening)
              echo "JOKE_LANGUAGE=zh" >> "$GITHUB_ENV"
              echo "JOKE_CSV=daily-jokes-zh-500.csv" >> "$GITHUB_ENV"
              echo "JOKE_DB=data/jokes-zh.db" >> "$GITHUB_ENV"
              echo "JOKE_STATE=data/selection_state-zh.json" >> "$GITHUB_ENV"
              ;;
            afternoon)
              echo "JOKE_LANGUAGE=en" >> "$GITHUB_ENV"
              echo "JOKE_CSV=daily-jokes-1000.csv" >> "$GITHUB_ENV"
              echo "JOKE_DB=data/jokes.db" >> "$GITHUB_ENV"
              echo "JOKE_STATE=data/selection_state-en.json" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Send joke
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Sending $JOKE_LANGUAGE joke for $JOKE_PHASE"
          python send_telegram_joke.py --phase "$JOKE_PHASE" --csv "$JOKE_CSV" --db "$JOKE_DB" --state "$JOKE_STATE"

      - name: Save recent-joke history
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            data/selection_state-zh.json
            data/selection_state-en.json
          key: joke-history-${{ github.run_id }}-${{ github.run_attempt }}
